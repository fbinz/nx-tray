name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev

      - name: Build
        run: go build -trimpath -ldflags="-s -w" -o nx-tray .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: nx-tray
          generate_release_notes: true
