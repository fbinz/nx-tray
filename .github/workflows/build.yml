name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev

      - name: Build
        run: go build -o nx-tray .

      - name: Vet
        run: go vet ./...
